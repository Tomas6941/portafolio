<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Tomás</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #070708;
      color: #e8e8ea;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .noise {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.035;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .container { text-align: center; max-width: 500px; }
    .code { font-size: 7rem; font-weight: 800; color: #1e1e20; line-height: 1; letter-spacing: -0.05em; margin-bottom: 16px; }
    .title { font-size: 1.4rem; font-weight: 600; color: #e8e8ea; margin-bottom: 12px; letter-spacing: -0.02em; }
    .desc { font-size: 0.9rem; color: #88889a; line-height: 1.7; margin-bottom: 36px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 32px;
      background: #ffffff;
      color: #070708;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="container">
    <div class="code">404</div>
    <h1 class="title">Página no encontrada</h1>
    <p class="desc">La página que buscás no existe o fue movida. Mejor volvé al inicio.</p>
    <a href="/" class="btn">Volver al inicio</a>
  </div>
</body>
</html>
