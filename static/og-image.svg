  <line x1="80" y1="410" x2="360" y2="410" stroke="#1e1e20" stroke-width="2"/>
  <text x="80" y="460" font-family="Inter, 'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="#555566">Python · Flask · HTML · CSS · JavaScript</text>
